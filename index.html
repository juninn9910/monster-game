<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신체 활동 게임: 몬스터 물리치기!</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Malgun Gothic', sans-serif; }
        
        /* UI 텍스트 오버레이 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #level-text { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); font-size: 3rem; font-weight: bold; color: #00e5ff; text-shadow: 3px 3px 6px #000; }
        
        #message-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: bold; color: #ffeb3b; text-shadow: 4px 4px 0px #000; text-align: center; display: none; width: 100%; z-index: 10;}
        
        /* 컨트롤 패널 (모드 선택) */
        #controls { position: absolute; bottom: 20px; left: 20px; pointer-events: auto; background: rgba(255,255,255,0.8); padding: 15px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        button { font-size: 1.2rem; padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 10px; background-color: #4CAF50; color: white; font-weight: bold; }
        button.inactive { background-color: #aaa; }
        
        /* 난이도 설정 패널 (선생님용) */
        #settings-btn { position: absolute; top: 20px; right: 20px; font-size: 3rem; cursor: pointer; z-index: 100; transition: transform 0.2s; pointer-events: auto; background: rgba(255,255,255,0.5); border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center;}
        #settings-panel { position: absolute; top: 90px; right: 20px; background: rgba(255,255,255,0.95); padding: 20px; border-radius: 15px; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: none; min-width: 250px; font-size: 1.2rem; pointer-events: auto; }
        #settings-panel label { display: block; margin: 15px 0; font-weight: bold; }
        #settings-panel input[type=range] { width: 100%; margin-top: 5px; }
        #close-settings { width: 100%; background-color: #ff3366; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="level-text">STAGE 1</div>
        <div id="message-box"></div>
    </div>

    <div id="settings-btn" onclick="toggleSettings()">⚙️</div>
    <div id="settings-panel">
        <h3 style="margin-top:0; text-align:center;">선생님 설정 (난이도)</h3>
        <label>움직임 민감도 (예민 ↔ 둔감)<br>
            <input type="range" id="setting-sensitivity" min="20" max="100" step="10" value="40">
        </label>
        <button id="close-settings" onclick="toggleSettings()">닫기</button>
    </div>

    <div id="controls">
        <div style="font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; text-align: center;">필살기 발동 (소리 켜짐)</div>
        <button id="btn-hand" onclick="setMode('HAND')">✋ 손 들기</button>
        <button id="btn-color" class="inactive" onclick="setMode('COLOR')">🔴 빨간색 감지</button>
    </div>

    <script>
        let video;
        let poseNet;
        let poses = [];
        let prevFrame;
        
        let gameState = 'PLAYING'; 
        let triggerMode = 'HAND'; 
        
        let level = 1;
        const monsters = ['👾', '👻', '🦖', '👽', '🐉', '🐙'];
        
        let monsterHp = 100;
        let maxHp = 100;
        let monsterX, monsterY;
        let isMonsterHit = false; 
        let hitTimer = 0;
        
        let projectiles = [];
        let particles = [];
        let lastShotTime = 0; 
        let lastBigShotTime = 0; 

        // 사운드 엔진
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'shoot') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'big_shoot') {
                osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'hit') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'success') {
                playNote(523.25, 0.0); playNote(659.25, 0.15); playNote(783.99, 0.3); playNote(1046.50, 0.45);
            }
        }

        function playNote(freq, delay) {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'square'; osc.frequency.value = freq; osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0, audioCtx.currentTime + delay); gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + delay + 0.05); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + delay + 0.3);
            osc.start(audioCtx.currentTime + delay); osc.stop(audioCtx.currentTime + delay + 0.3);
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = random(-15, 15); this.vy = random(-20, -5);
                this.color = [random(100,255), random(100,255), random(100,255)];
                this.alpha = 255; this.size = random(10, 25);
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.8; this.alpha -= 5; }
            show() { push(); noStroke(); fill(this.color[0], this.color[1], this.color[2], this.alpha); rect(this.x, this.y, this.size, this.size); pop(); }
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            monsterX = width * 0.8; monsterY = height / 2;
            
            video = createCapture(VIDEO, () => {
                prevFrame = createImage(video.width, video.height);
                poseNet = ml5.poseNet(video, () => console.log('AI 로드됨'));
                poseNet.on('pose', (results) => poses = results);
            });
            video.size(640, 480);
            video.hide(); 
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            monsterX = width * 0.8; monsterY = height / 2;
        }

        function draw() {
            push();
            translate(width, 0); scale(-1, 1);
            image(video, 0, 0, width, height);
            pop();
            
            fill(0, 0, 0, 100); rect(0, 0, width, height);

            if (gameState === 'PLAYING') {
                detectMotion(); 
                if (triggerMode === 'HAND') detectHandsUp(); 
                else if (triggerMode === 'COLOR') detectColor(); 
                
                updateAndDrawProjectiles();
                drawMonster();
                drawHpBar();
            } else if (gameState === 'CLEARED') {
                drawMonster(); 
                updateAndDrawParticles();
            }
        }

        function detectMotion() {
            if (!video.loadedmetadata || !prevFrame) return;

            video.loadPixels(); prevFrame.loadPixels();
            
            let sensitivity = parseFloat(document.getElementById('setting-sensitivity').value);
            let motionCount = 0;
            
            if (video.pixels.length > 0 && prevFrame.pixels.length > 0) {
                for (let i = 0; i < video.pixels.length; i += 32) {
                    if (abs(video.pixels[i] - prevFrame.pixels[i]) > sensitivity) motionCount++;
                }
            }

            if (motionCount > 200 && millis() - lastShotTime > 200) {
                projectiles.push({ x: width * 0.2, y: random(height * 0.3, height * 0.7), speed: 25, type: '✨', damage: 5 });
                playSound('shoot');
                lastShotTime = millis();
                
                push(); noFill(); stroke(255, 255, 255, 100); strokeWeight(20); rect(0, 0, width, height); pop();
            }
            
            prevFrame.copy(video, 0, 0, video.width, video.height, 0, 0, video.width, video.height);
        }

        // ⭐ 변경된 부분: 한 손만 인식해도 발동되도록 수정!
        function detectHandsUp() {
            if (poses.length > 0) {
                let pose = poses[0].pose;
                
                // 코(nose)의 위치를 기준으로, 왼손이나 오른손 중 하나라도 코보다 위에 있으면 발동
                // confidence(신뢰도)를 0.5에서 0.3으로 낮춰서 인식률을 높임
                let leftHandUp = (pose.leftWrist.confidence > 0.3 && pose.leftWrist.y < pose.nose.y);
                let rightHandUp = (pose.rightWrist.confidence > 0.3 && pose.rightWrist.y < pose.nose.y);

                if (leftHandUp || rightHandUp) {
                    fireUltimate();
                }
            }
        }

        function detectColor() {
            video.loadPixels();
            let redCount = 0;
            for (let i = 0; i < video.pixels.length; i += 16) {
                if (video.pixels[i] > 180 && video.pixels[i+1] < 80 && video.pixels[i+2] < 80) redCount++;
            }
            if (redCount > 1000) fireUltimate();
        }

        function fireUltimate() {
            if (millis() - lastBigShotTime > 2000) {
                projectiles.push({ x: width * 0.2, y: height / 2, speed: 35, type: '🔥', damage: 30 });
                playSound('big_shoot');
                lastBigShotTime = millis();
            }
        }

        function updateAndDrawProjectiles() {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.speed; 
                
                push(); textAlign(CENTER, CENTER); textSize(p.type === '🔥' ? 150 : 60); text(p.type, p.x, p.y); pop();

                if (p.x >= monsterX - 100) {
                    monsterHp -= p.damage;
                    playSound('hit');
                    isMonsterHit = true; hitTimer = millis(); 
                    projectiles.splice(i, 1); 
                    
                    if (monsterHp <= 0) { monsterHp = 0; levelClear(); }
                }
            }
        }

        function drawMonster() {
            push(); textAlign(CENTER, CENTER);
            let shakeX = 0; let displayIcon = monsters[(level - 1) % monsters.length];
            
            if (isMonsterHit && millis() - hitTimer < 200) { shakeX = random(-20, 20); displayIcon = '💥'; } 
            else { isMonsterHit = false; }

            if (gameState === 'CLEARED') { displayIcon = '😵'; monsterY += 5; }

            textSize(200); text(displayIcon, monsterX + shakeX, monsterY);
            pop();
        }

        function drawHpBar() {
            push(); let barWidth = 300; let barHeight = 40; let xPos = width - barWidth - 50; let yPos = 50;
            fill(0, 0, 0, 150); stroke(255); strokeWeight(4); rect(xPos, yPos, barWidth, barHeight, 20);

            let hpRatio = max(0, monsterHp / maxHp);
            noStroke();
            if (hpRatio > 0.5) fill(0, 255, 0); else if (hpRatio > 0.2) fill(255, 200, 0); else fill(255, 0, 0);
            
            rect(xPos + 5, yPos + 5, (barWidth - 10) * hpRatio, barHeight - 10, 15);
            fill(255); textSize(24); textAlign(CENTER, CENTER); text("몬스터 HP", xPos + barWidth / 2, yPos + barHeight / 2);
            pop();
        }

        function levelClear() {
            gameState = 'CLEARED'; playSound('success');
            particles = []; for(let i=0; i<150; i++) particles.push(new Particle(monsterX, monsterY));
            let msgBox = document.getElementById('message-box');
            msgBox.style.display = 'block'; msgBox.innerHTML = `STAGE ${level} 클리어!<br>다음 몬스터가 나타납니다!`;
            setTimeout(nextLevel, 4000); 
        }

        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].show(); if (particles[i].alpha <= 0) particles.splice(i, 1); }
        }

        function nextLevel() {
            level++; maxHp += 50; monsterHp = maxHp; monsterX = width * 0.8; monsterY = height / 2; projectiles = [];
            document.getElementById('level-text').innerText = 'STAGE ' + level; document.getElementById('message-box').style.display = 'none';
            gameState = 'PLAYING';
        }

        function setMode(mode) {
            triggerMode = mode;
            if(audioCtx.state === 'suspended') audioCtx.resume(); 
            document.getElementById('btn-hand').className = mode === 'HAND' ? '' : 'inactive';
            document.getElementById('btn-color').className = mode === 'COLOR' ? '' : 'inactive';
        }

        function toggleSettings() {
            let panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'none' || panel.style.display === '' ? 'block' : 'none';
        }
    </script>
</body>
</html>
