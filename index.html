<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신체 활동 게임 (디버깅 모드)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; font-family: 'Malgun Gothic', sans-serif; color: white; }
        #game-container { position: absolute; top:0; left:0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; z-index: 1;}
        
        /* 디버그 패널 (화면 왼쪽 위에 고정) */
        #debug-panel {
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); 
            border: 2px solid #00ffcc; padding: 15px; border-radius: 10px; z-index: 100;
            font-size: 1.1rem; line-height: 1.5; color: #00ffcc; font-family: monospace;
            max-width: 400px;
        }
        .error-text { color: #ff3366; font-weight: bold; }
        .highlight { color: #ffff00; }

        /* UI 요소 */
        .gauge-container { position: absolute; top: 20px; width: 60%; height: 50px; background-color: rgba(255, 255, 255, 0.3); border-radius: 25px; border: 5px solid #fff; z-index: 10;}
        .gauge-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ffea00, #ffaa00); }
        .gauge-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        
        #controls { position: absolute; bottom: 20px; right: 20px; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 15px; z-index: 10; color: black;}
        button { font-size: 1.2rem; padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 10px; background-color: #4CAF50; color: white; font-weight: bold; }
        button.inactive { background-color: #aaa; }
    </style>
</head>
<body>

    <div id="debug-panel">
        <div>🔍 <b>시스템 상태</b></div>
        <div id="log-video">비디오 로딩 중...</div>
        <div id="log-ai">AI 모델 로딩 중...</div>
        <hr style="border-color: #00ffcc;">
        <div>🏃 <b>1단계: 모션 (마나 충전)</b></div>
        <div id="log-motion">현재 움직임 수치: 0</div>
        <div id="log-error" class="error-text"></div>
        <hr style="border-color: #00ffcc;">
        <div>🙌 <b>2단계: 포즈 (필살기)</b></div>
        <div id="log-pose">사람을 찾는 중...</div>
    </div>

    <div id="game-container">
        <div class="gauge-container"><div class="gauge-bar" id="gauge-bar"></div><div class="gauge-text" id="gauge-text">에너지: 0%</div></div>
        <div id="monster" style="font-size: 150px; position: absolute;">👾</div>
    </div>

    <div id="controls">
        <b>필살기 모드</b><br>
        <button id="btn-hand" onclick="setMode('HAND')">🙌 손 들기</button>
        <button id="btn-color" class="inactive" onclick="setMode('COLOR')">🔴 빨간색 찾기</button>
    </div>

    <script>
        let video;
        let poseNet;
        let poses = [];
        let prevFrame;
        let mana = 0;
        let gameState = 'CHARGING';
        let triggerMode = 'HAND';

        function setup() {
            let canvas = createCanvas(800, 600);
            canvas.parent('game-container');
            
            // 비디오 캡처 안전하게 초기화
            video = createCapture(VIDEO, function() {
                document.getElementById('log-video').innerHTML = '✅ 비디오 로드 완료 (권한 OK)';
                video.size(640, 480);
                video.hide();
                
                // 비디오가 켜진 후 AI 로드 시작
                poseNet = ml5.poseNet(video, function() {
                    document.getElementById('log-ai').innerHTML = '✅ AI(PoseNet) 로드 완료';
                });
                
                poseNet.on('pose', function(results) {
                    poses = results;
                });
            });
        }

        function draw() {
            clear();
            push();
            translate(width, 0); scale(-1, 1);
            if (video.loadedmetadata) {
                image(video, 0, 0, width, height);
            }
            pop();

            if (gameState === 'CHARGING') {
                detectMotion();
            } else if (gameState === 'READY') {
                if (triggerMode === 'HAND') detectHandsUp();
            }
        }

        function detectMotion() {
            if (!video.loadedmetadata) return;

            try {
                video.loadPixels();
                
                // 첫 프레임이거나 prevFrame이 없을 때 안전하게 복사
                if (!prevFrame) {
                    prevFrame = createImage(video.width, video.height);
                    prevFrame.copy(video, 0, 0, video.width, video.height, 0, 0, video.width, video.height);
                    return;
                }

                prevFrame.loadPixels();
                let motionCount = 0;
                
                // 속도 향상을 위해 16픽셀이 아닌 32픽셀 단위로 크게 건너뛰며 검사 (성능 안정화)
                if (video.pixels.length > 0 && prevFrame.pixels.length > 0) {
                    for (let i = 0; i < video.pixels.length; i += 32) {
                        let diff = abs(video.pixels[i] - prevFrame.pixels[i]);
                        if (diff > 40) { // 민감도 고정 테스트
                            motionCount++;
                        }
                    }
                }

                // 디버그 창에 현재 움직임 수치 실시간 표시!
                document.getElementById('log-motion').innerHTML = `현재 움직임 수치: <span class="highlight">${motionCount}</span>`;

                if (motionCount > 100) { 
                    mana += 1; 
                    push(); noFill(); stroke(255, 234, 0, 150); strokeWeight(15); rect(0, 0, width, height); pop();
                }

                updateManaUI();

                if (mana >= 100) {
                    mana = 100;
                    gameState = 'READY';
                    document.getElementById('log-motion').innerHTML = "충전 완료! 대기 중...";
                }

                prevFrame.copy(video, 0, 0, video.width, video.height, 0, 0, video.width, video.height);
                document.getElementById('log-error').innerText = ""; // 에러 없으면 비움

            } catch (e) {
                // 핵심! 로컬 보안 차단(CORS) 에러가 나면 여기에 뜹니다.
                document.getElementById('log-error').innerText = "⚠️ 에러: 픽셀 데이터를 읽을 수 없습니다.\n(바탕화면에서 파일을 직접 실행하셨나요? 깃허브 배포가 필요합니다!)";
                console.error(e);
            }
        }

        function detectHandsUp() {
            if (poses.length > 0) {
                let pose = poses[0].pose;
                // 디버그 창에 코와 양손의 좌표(높낮이)를 실시간 표시!
                let noseY = Math.floor(pose.nose.y);
                let leftY = Math.floor(pose.leftWrist.y);
                let rightY = Math.floor(pose.rightWrist.y);
                
                document.getElementById('log-pose').innerHTML = 
                    `얼굴(코) 높이: ${noseY}<br>` +
                    `왼손 높이: <span class="${leftY < noseY ? 'highlight' : ''}">${leftY}</span><br>` +
                    `오른손 높이: <span class="${rightY < noseY ? 'highlight' : ''}">${rightY}</span><br>` +
                    `<small>*숫자가 작을수록 화면 위쪽입니다.</small>`;

                // 신뢰도가 낮아도 일단 테스트를 위해 발동되게 조건 완화
                if (leftY < noseY && rightY < noseY) {
                    document.getElementById('log-pose').innerHTML = "💥 필살기 발동 성공!!";
                    mana = 0;
                    gameState = 'CHARGING'; // 바로 다시 충전상태로
                }
            } else {
                document.getElementById('log-pose').innerHTML = "화면에서 사람(관절)을 찾지 못했습니다.";
            }
        }

        function updateManaUI() {
            document.getElementById('gauge-bar').style.width = mana + '%';
            document.getElementById('gauge-text').innerText = `에너지: ${Math.floor(mana)}%`;
        }

        function setMode(mode) {
            triggerMode = mode;
            document.getElementById('btn-hand').className = mode === 'HAND' ? '' : 'inactive';
            document.getElementById('btn-color').className = mode === 'COLOR' ? '' : 'inactive';
        }
    </script>
</body>
</html>
